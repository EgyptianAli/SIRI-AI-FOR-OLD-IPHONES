workflows:
  ios-workflow:
    name: Siri AI iOS
    max_build_duration: 10
    instance_type: mac_mini_m2

    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.vintage.siriai
      xcode: latest
      cocoapods: default
      vars:
        XCODE_PROJECT: SiriAI.xcodeproj
        XCODE_SCHEME: SiriAI

    integrations:
      app_store_connect: siri_ai_asc

    scripts:
      - name: Set up signing
        script: |
          xcode-project use-profiles

      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --project "$CM_BUILD_DIR/$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"

    artifacts:
      - build/ios/ipa/*.ipa
      - build/**/*.log
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.app
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM
